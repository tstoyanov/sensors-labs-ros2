services:
  robotics_service:  # name of the service/container, also update run.sh
    build:
      context: .
      dockerfile: Dockerfile
      ssh:
        - default  # Enables SSH forwarding
    image: tstoyanov/sensors_labs_ros2:v1  # name of the image
    volumes:
      # GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority
      - ../workspace/src:/root/home/ros2_ws/src
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    environment:
      - TERM=xterm-256color
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
      - CUDA_VISIBLE_DEVICES=0
      # prevents error due to CUDA version mismatch
      - NVIDIA_DISABLE_REQUIRE=1
      # GUI
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    working_dir: /root/home/ros2_ws
    # Interactive shell
    stdin_open: true  # Keeps stdin open to interact with the container
    tty: true         # Allocates a pseudo-TTY for the container
    privileged: true  # Allows dmesg: https://github.com/moby/moby/issues/41318#issuecomment-669974920
    # Networking and IPC for ROS 2
    network_mode: host
    ipc: host         
